<canvas id="imageCanvas" style="width:100vw; height:100vh; object-fit:contain; background:#000;"></canvas>

<script>
  const img = new Image();
  img.src = 'Stores.png';
  img.onload = () => {
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
  };
</script>
