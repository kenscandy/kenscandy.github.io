<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
            background-color: black; /* Optional: adds a background for transparent PNGs */
        }
        .full-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Scales image to fit without cropping */
        }
    </style>
</head>
<body>
    <img src="Stores.png" class="full-image" alt="Full screen image">
</body>
</html>
