<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Viewer</title>
    <style>
        /* Fill the screen and center content */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            background-color: black;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Shield: This invisible layer sits ON TOP of the image 
           to stop Safari from 'seeing' the long-press */
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }

        img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            /* Extra safety layers */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <!-- This div intercepts all touches so the image never crashes -->
    <div class="touch-shield"></div>
    
    <img src="Stores.png" alt="Hosted Image">
</body>
</html>
        const ctx = canvas.getContext('2d');
        const img = new Image();

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        };

        img.src = 'Stores.png'; 
    </script>
</body>
</html>
