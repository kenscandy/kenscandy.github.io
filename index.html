<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stores</title>
    <style>
        /* Makes the PDF fill the entire browser window */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
        }
        .fallback-msg {
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <object data="Stores.pdf" type="application/pdf" width="100%" height="100%">
            
            <!-- Fallback 1: Iframe for better compatibility -->
            <iframe src="Stores.pdf" width="100%" height="100%" style="border: none;">
                
                <!-- Fallback 2: Direct link if both above fail -->
                <div class="fallback-msg">
                    <p>It appears your browser doesn't support embedded PDFs.</p>
                    <p><a href="Stores.pdf" target="_blank">Click here to download and view the PDF.</a></p>
                </div>

            </iframe>
        </object>
    </div>

</body>
</html>
